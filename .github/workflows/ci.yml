name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Django test suite
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: saas_futebol
          POSTGRES_USER: saas_futebol
          POSTGRES_PASSWORD: saas_futebol
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saas_futebol"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DJANGO_DEBUG: '0'
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: saas_futebol
      DB_USER: saas_futebol
      DB_PASSWORD: saas_futebol

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Checagens do Django
        run: python src/manage.py check

      - name: Verificar migrações pendentes
        run: python src/manage.py makemigrations --check --dry-run

      - name: Rodar suíte de testes
        run: python src/manage.py test futebol --verbosity 2
