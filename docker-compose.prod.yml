services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME obrigatório}
      POSTGRES_USER: ${DB_USER:?DB_USER obrigatório}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatório}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ${PRODUCTION_ENV_FILE:-.env.production}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings_production
      DJANGO_MEDIA_ROOT: /app/var/media
      DB_HOST: db
      DB_PORT: 5432
    command:
      - gunicorn
      - --bind=0.0.0.0:8000
      - --workers=${GUNICORN_WORKERS:-3}
      - --timeout=${GUNICORN_TIMEOUT:-60}
      - --access-logfile=-
      - --error-logfile=-
      - config.wsgi:application
    volumes:
      - media_data:/app/var/media
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent -H 'X-Forwarded-Proto: https' http://localhost:8000/health/ | grep -q '\"status\": \"ok\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  backup:
    image: postgres:16-alpine
    profiles: ["ops"]
    env_file:
      - ${PRODUCTION_ENV_FILE:-.env.production}
    environment:
      DB_HOST: db
      DB_PORT: 5432
      BACKUP_DIR: /backups
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "/scripts/backup_postgres.sh"]
    depends_on:
      db:
        condition: service_healthy

  media-backup:
    image: alpine:3.20
    profiles: ["ops"]
    environment:
      BACKUP_DIR: /backups
      MEDIA_DIR: /media
    volumes:
      - media_data:/media:ro
      - ./backups:/backups
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/backup_media.sh"]

  media-restore:
    image: alpine:3.20
    profiles: ["restore"]
    environment:
      MEDIA_DIR: /media
    volumes:
      - media_data:/media
      - ./backups:/backups:ro
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/restore_media.sh"]

volumes:
  postgres_data:
  media_data:
