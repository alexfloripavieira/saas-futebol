services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-saas_futebol}
      POSTGRES_USER: ${DB_USER:-saas_futebol}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-saas_futebol}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-saas_futebol} -d ${DB_NAME:-saas_futebol}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    command: python src/manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
